name: CI/CD Pipeline - Build, Test, Security & Deploy

on:
  push:
    branches: [ main, staging, stagging ]
  pull_request:
    branches: [ main, staging, stagging ]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # JOB 1: Lint, Type Check, Test & Build
  # ============================================
  build-and-test:
    runs-on: ubuntu-latest
    name: 🔨 Build & Test

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci

    - name: 🔍 Run Linting (ESLint)
      run: npm run lint
      continue-on-error: false

    - name: 📝 Check Types (TypeScript)
      run: npx tsc --noEmit --pretty
      continue-on-error: false

    - name: 🧪 Run Unit Tests (Vitest)
      run: npm run test:ci

    - name: 🏗️ Build Production
      run: npm run build
      env:
        NODE_ENV: production

    - name: 📊 Verify Build Output
      run: |
        echo "=== Build Output Verification ==="
        ls -la out/
        echo "Total files in out/:"
        find out/ -type f | wc -l
        echo "=== Static pages generated ==="
        find out/ -name "*.html" | head -20

    - name: 📏 Check Bundle Size
      run: |
        echo "=== Bundle Size Analysis ==="
        TOTAL_SIZE=$(du -sh out/ | cut -f1)
        echo "Total build size: $TOTAL_SIZE"
        # Fail if build exceeds 50MB
        SIZE_BYTES=$(du -sb out/ | cut -f1)
        MAX_BYTES=52428800
        if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
          echo "❌ Build size exceeds 50MB limit!"
          exit 1
        fi
        echo "✅ Build size within limits"

    - name: 📤 Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: out/
        retention-days: 3

  # ============================================
  # JOB 2: Security Audit (SAST + Dependency Scan)
  # ============================================
  security-audit:
    runs-on: ubuntu-latest
    name: 🔒 Security Audit

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci

    - name: 🔐 npm Audit (Dependency Vulnerabilities)
      run: |
        echo "=== npm Audit Report ==="
        npm audit --audit-level=high || echo "⚠️ Vulnerabilities found (non-blocking)"

    - name: 🕵️ Check for Hardcoded Secrets
      run: |
        echo "=== Checking for potential hardcoded secrets ==="
        grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
          -e "sk_live" -e "pk_live" -e "AKIA" -e "password.*=.*['\"]" \
          -e "secret.*=.*['\"]" -e "token.*=.*['\"]" -e "apikey.*=.*['\"]" \
          --exclude-dir=node_modules --exclude-dir=.next \
          --exclude-dir=out --exclude="*.test.*" --exclude="*.d.ts" \
          src/ scripts/ || echo "✅ No obvious hardcoded secrets found"

    - name: 🛡️ Verify Security Headers
      run: |
        echo "=== Verifying _headers file ==="
        if [ -f "public/_headers" ]; then
          echo "✅ _headers file exists"
          if grep -q "X-Frame-Options" public/_headers; then echo "✅ Clickjacking protection"; else echo "❌ Missing X-Frame-Options"; exit 1; fi
          if grep -q "Content-Security-Policy" public/_headers; then echo "✅ CSP header"; else echo "❌ Missing CSP"; exit 1; fi
          if grep -q "Strict-Transport-Security" public/_headers; then echo "✅ HSTS header"; else echo "❌ Missing HSTS"; exit 1; fi
          if grep -q "X-Content-Type-Options" public/_headers; then echo "✅ MIME sniffing protection"; else echo "❌ Missing X-Content-Type-Options"; exit 1; fi
        else
          echo "❌ _headers file missing!"
          exit 1
        fi

    - name: 🔎 SAST - Static Analysis
      run: |
        echo "=== Static Application Security Testing ==="
        # Check for dangerous patterns
        echo "--- Checking for eval/Function usage ---"
        grep -rn "eval(" --include="*.ts" --include="*.tsx" \
          --exclude-dir=node_modules --exclude-dir=.next \
          src/ || echo "✅ No eval() found"

        echo "--- Checking for dangerouslySetInnerHTML ---"
        grep -rn "dangerouslySetInnerHTML" --include="*.tsx" \
          --exclude-dir=node_modules --exclude-dir=.next \
          src/ || echo "✅ No uncontrolled dangerouslySetInnerHTML"

        echo "--- Checking for raw SQL concatenation ---"
        grep -rn "sql.*+.*\$" --include="*.ts" \
          --exclude-dir=node_modules --exclude-dir=.next \
          src/ || echo "✅ No raw SQL concatenation found"

    - name: 🔐 Check OWASP Security Coverage
      run: |
        echo "=== OWASP Security Verification ==="
        echo "--- XSS Protection ---"
        grep -l "sanitizeInput\|DOMPurify\|sanitize-html\|xss" src/lib/security*.ts && echo "✅ XSS sanitization present" || echo "❌ Missing XSS protection"

        echo "--- CSRF Protection ---"
        grep -l "CSRFToken\|csrf" src/lib/security*.ts && echo "✅ CSRF tokens present" || echo "❌ Missing CSRF protection"

        echo "--- Rate Limiting ---"
        grep -l "rateLimit\|checkRateLimit" src/lib/security*.ts src/app/api/middleware.ts && echo "✅ Rate limiting present" || echo "❌ Missing rate limiting"

        echo "--- Input Sanitization ---"
        grep -l "sanitizeInput\|sanitizeServerInput" src/lib/security*.ts src/app/api/middleware.ts && echo "✅ Input sanitization present" || echo "❌ Missing input sanitization"

  # ============================================
  # JOB 3: Deploy to Cloudflare Pages
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy to Cloudflare Pages
    needs: [build-and-test, security-audit]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/stagging')
    
    permissions:
      contents: read
      deployments: write

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📥 Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: out/

    - name: 🚀 Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy out/ --project-name=prisma-rt04 --branch=${{ github.ref_name }}

    - name: ✅ Deployment Summary
      run: |
        echo "============================================"
        echo "  🎉 Deployment Successful!"
        echo "============================================"
        echo "  📦 Project: prisma-rt04"
        echo "  🌐 URL: https://prisma-rt04.pages.dev"
        echo "  ⏰ Time: $(date)"
        echo "  📋 Commit: ${{ github.sha }}"
        echo "============================================"

    - name: 📱 Notify Telegram on Deploy
      if: always()
      continue-on-error: true
      run: |
        STATUS="${{ job.status }}"
        if [ "$STATUS" = "success" ]; then
          EMOJI="✅"
          TEXT="berhasil"
        else
          EMOJI="❌"
          TEXT="gagal"
        fi

        if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.ADMIN_CHAT_ID }}" ]; then
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.ADMIN_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="$EMOJI <b>Deploy ${TEXT}!</b>%0A%0A📦 Project: prisma-rt04%0A📋 Commit: $(echo ${{ github.sha }} | head -c 7)%0A⏰ $(date '+%Y-%m-%d %H:%M')"
        fi
